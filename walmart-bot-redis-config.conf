# Redis Configuration for Walmart Bot High-Performance Caching
# Optimized for inventory monitoring and session management

# Network and Security
bind 127.0.0.1 ::1
protected-mode yes
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# Memory Management
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence Configuration
# RDB snapshots for data durability
save 900 1     # Save if at least 1 key changed in 900 seconds
save 300 10    # Save if at least 10 keys changed in 300 seconds  
save 60 10000  # Save if at least 10000 keys changed in 60 seconds

rdbcompression yes
rdbchecksum yes
dbfilename walmart-bot-cache.rdb
dir /var/lib/redis/

# AOF (Append Only File) for better durability
appendonly yes
appendfilename "walmart-bot-cache.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance Tuning
databases 16
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Connection Management
maxclients 10000
tcp-keepalive 300

# Slow Log Configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Hash and List Configuration (optimized for bot data)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog Configuration
hll-sparse-max-bytes 3000

# Security (in production, set a strong password)
# requirepass your-strong-password-here

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled yes
syslog-ident redis

# Latency Monitoring
latency-monitor-threshold 100

# Memory Usage Tracking
maxmemory-samples 5

# Keyspace Notifications (for cache invalidation)
notify-keyspace-events "Ex"

# Custom Configuration for Bot Operations

# Inventory Cache Settings
# - Use db 0 for inventory data (high frequency)
# - Use db 1 for session data (medium frequency)  
# - Use db 2 for configuration data (low frequency)
# - Use db 3 for performance metrics (high volume)

# LUA Script Configuration
lua-time-limit 5000

# Module Configuration (if using Redis modules)
# loadmodule /path/to/redisearch.so
# loadmodule /path/to/redisjson.so

# Replica Configuration (if using replication)
# replicaof <masterip> <masterport>
# replica-read-only yes
# repl-ping-replica-period 10
# repl-timeout 60

# Clustering (if using Redis Cluster)
# cluster-enabled yes
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000